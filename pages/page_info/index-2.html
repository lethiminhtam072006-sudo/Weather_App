<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <video autoplay muted loop class="video">
        <source src="../../images/stormmp4.mp4" type="video/mp4" />
      </video>
      <!-- Search Bar -->
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search for cities"
        />
        <button id="searchBtn">Search</button>
      </div>

      <div class="grid">
        <!-- Left Column -->
        <div class="day-forecast">
          <!-- Current Weather -->
          <div class="card current-weather">
            <div class="weather-display">
              <h1 id="cityName">Madrid</h1>
              <p class="chance-rain" id="chanceRain">Chance of rain: 0%</p>
              <div class="temperature" id="currentTemp">31°</div>
            </div>

            <div class="weather-icon icon-floating" id="weatherIcon">☁️</div>
            <p id="weatherDesc"></p>
          </div>

          <!-- Today's Forecast with Chart -->
          <div class="card forecast-chart">
            <h2>TODAY'S FORECAST</h2>

            <div class="chart-container">
              <canvas id="tempChart" class="chart-canvas"></canvas>
            </div>
          </div>

          <!-- Air Conditions -->
          <div class="card air-conditions">
            <div class="air-header">
              <h2>AIR CONDITIONS</h2>
              <button class="see-more-btn">See more</button>
            </div>

            <div class="air-grid">
              <div class="air-item">
                <div class="air-label">
                  <span>🌡️</span>
                  <span>Real Feel</span>
                </div>
                <div class="air-value" id="feelsLike">30°</div>
              </div>

              <div class="air-item">
                <div class="air-label">
                  <span>💨</span>
                  <span>Wind</span>
                </div>
                <div class="air-value" id="windSpeed">0.2 km/h</div>
              </div>

              <div class="air-item">
                <div class="air-label">
                  <span>💧</span>
                  <span>Chance of rain</span>
                </div>
                <div class="air-value" id="humidity">0%</div>
              </div>

              <div class="air-item">
                <div class="air-label">
                  <span>☀️</span>
                  <span>UV Index</span>
                </div>
                <div class="air-value" id="pressure">3</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column - 7-Day Forecast -->
        <div class="card week-forecast">
          <h2>7-DAY FORECAST</h2>

          <div class="forecast-list" id="forecastList">
            <div class="forecast-day">
              <div class="day-name">Today</div>
              <div class="day-weather">
                <div class="day-icon">☀️</div>
                <div class="day-condition">Sunny</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">36</span
                ><span class="temp-low">/22</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Tue</div>
              <div class="day-weather">
                <div class="day-icon">☀️</div>
                <div class="day-condition">Sunny</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Wed</div>
              <div class="day-weather">
                <div class="day-icon">☀️</div>
                <div class="day-condition">Sunny</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Thu</div>
              <div class="day-weather">
                <div class="day-icon">☁️</div>
                <div class="day-condition">Cloudy</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Fri</div>
              <div class="day-weather">
                <div class="day-icon">☁️</div>
                <div class="day-condition">Cloudy</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Sat</div>
              <div class="day-weather">
                <div class="day-icon">🌧️</div>
                <div class="day-condition">Rainy</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Sun</div>
              <div class="day-weather">
                <div class="day-icon">⚡</div>
                <div class="day-condition">Storm</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <script src="./style.js"></script>
  </body>
</html>
