<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <video autoplay muted loop class="video">
      <source src="../../images/stormmp4.mp4" type="video/mp4" />
    </video>
    <div class="container">
      <!-- Search Bar -->
      <div class="nav-controls">
        <input type="text" class="search" placeholder="🔍 Tìm kiếm..." />
      </div>

      <div class="grid">
        <!-- Left Column -->
        <div class="day-forecast">
          <!-- Current Weather -->
          <div class="card current-weather">
            <div class="weather-container">
              <div class="city-name">
                <span id="cityName">Madrid</span>
              </div>
              <div class="weather-info">
                <div class="icon icon-floating" id="weatherIcon">☁️</div>
                <div class="temp-desc">
                  <div class="weather-description" id="weatherDesc"></div>
                  <div class="temperature">
                    <div class="temp-celsius" id="currentTemp">31°</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Today's Forecast with Chart -->
          <div class="card forecast-chart">
            <h2>HÔM NAY</h2>
            <div class="chart-container">
              <canvas id="tempChart" class="chart-canvas"></canvas>
            </div>
          </div>

          <!-- Air Conditions -->
          <div class="card air-conditions">
            <div class="air-header">
              <h2>ĐIỀU KIỆN KHÍ HẬU</h2>
            </div>

            <div class="weather-details">
              <div class="detail-card">
                <div class="detail-label">Cảm giác</div>
                <div class="detail-value">
                  <span id="feelsLike">30°</span>
                </div>
              </div>
              <div class="detail-card">
                <div class="detail-label">Gió</div>
                <div class="detail-value">
                  <span id="windSpeed">0.2 km/h</span>
                </div>
              </div>
              <div class="detail-card">
                <div class="detail-label">Mưa</div>
                <div class="detail-value">
                  <span id="humidity">0%</span>
                </div>
              </div>
              <div class="detail-card">
                <div class="detail-label">Chỉ số UV</div>
                <div class="detail-value">
                  <span id="pressure">3</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column - 7-Day Forecast -->
        <div class="card week-forecast">
          <h2>DỰ BÁO 7 NGÀY</h2>

          <div class="forecast-list" id="forecastList">
            <div class="forecast-day">
              <div class="day-name">Today</div>
              <div class="day-weather">
                <div class="day-icon">☀️</div>
                <div class="day-condition">Sunny</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">36</span
                ><span class="temp-low">/22</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Tue</div>
              <div class="day-weather">
                <div class="day-icon">☀️</div>
                <div class="day-condition">Sunny</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Wed</div>
              <div class="day-weather">
                <div class="day-icon">☀️</div>
                <div class="day-condition">Sunny</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Thu</div>
              <div class="day-weather">
                <div class="day-icon">☁️</div>
                <div class="day-condition">Cloudy</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Fri</div>
              <div class="day-weather">
                <div class="day-icon">☁️</div>
                <div class="day-condition">Cloudy</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Sat</div>
              <div class="day-weather">
                <div class="day-icon">🌧️</div>
                <div class="day-condition">Rainy</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>

            <div class="forecast-day">
              <div class="day-name">Sun</div>
              <div class="day-weather">
                <div class="day-icon">⚡</div>
                <div class="day-condition">Storm</div>
              </div>
              <div class="day-temp">
                <span class="temp-high">37</span
                ><span class="temp-low">/21</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="./style.js"></script>
  </body>
</html>
