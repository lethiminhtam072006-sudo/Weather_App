<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weatherapp</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="nav-bar">
      <div class="nav-cities">
        <div class="nav-city" data-city="Ha Noi">Hà Nội</div>
        <div class="nav-city" data-city="Da Nang">Đà Nẵng</div>
        <div class="nav-city" data-city="Can Tho">Cần Thơ</div>
        <div class="nav-city" data-city="Quy Nhon">Quy Nhơn</div>
        <div class="nav-city active" data-city="Ho Chi Minh City">
          Hồ Chí Minh
        </div>
      </div>
      <div class="nav-controls">
        <div class="toggle-container" id="toggleUnit">
          <div class="toggle-slider" id="slider"></div>
          <div class="toggle-option active" id="celsius">°C</div>
          <div class="toggle-option" id="fahrenheit">°F</div>
        </div>
        <input type="text" class="search" placeholder="🔍 Conditions..." />
      </div>
    </div>

    <div class="container">
      <video autoplay muted loop class="video">
        <source src="../../images/night.mp4" type="video/mp4" />
      </video>
      <div class="weather-container">
        <div class="loading" id="loading">
          Đang tải... <span class="spinner"></span>
        </div>

        <div id="weatherData" class="hide">
          <div class="city-name">
            <span id="cityName">Ho Chi Minh City </span>
            <span class="country-code" id="countryCode"></span>
            <div class="datetime-container">
              <div class="date-subtitle" id="currentDate">11/12/2025</div>
              <div class="time-display">
                <span id="currentTime">10:03:18 CH</span>
              </div>
            </div>
          </div>
          <div class="weather-info">
            <div class="icon icon-floating" id="weatherIcon">☀️</div>
            <div class="weather-description" id="weatherDesc">Sunny</div>
            <div class="temperature">
              <div class="temp-celsius" id="tempCelsius">31°C</div>
              <div class="temp-fahrenheit" id="tempFahrenheit">87°F</div>
            </div>

            <div class="weather-details">
              <div class="detail-card">
                <div class="detail-label">Độ ẩm</div>
                <div class="detail-value">
                  <span class="detail-icon">💧</span>
                  <span id="humidity">65%</span>
                </div>
              </div>
              <div class="detail-card">
                <div class="detail-label">Tốc độ gió</div>
                <div class="detail-value">
                  <span class="detail-icon">💨</span>
                  <span id="windSpeed">2.57 km/h</span>
                </div>
              </div>
              <div class="detail-card">
                <div class="detail-label">áp suất</div>
                <div class="detail-value">
                  <span class="detail-icon">🌫️</span>
                  <span id="pressure">1012 hPa</span>
                </div>
              </div>
              <div class="detail-card">
                <div class="detail-label">Tầm nhìn</div>
                <div class="detail-value">
                  <span class="detail-icon">👁️</span>
                  <span id="visibility">10 km</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- / -->
    <!--  -->
    <!--  -->

    <script src="./style.js"></script>
  </body>
</html>
